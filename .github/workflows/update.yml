name: 毎日センチメント自動更新
on:
  schedule:
    # 朝9:00 JST（UTC 0:00）
    - cron: '0 0 * * *'
    # 昼12:00 JST（UTC 3:00）
    - cron: '0 3 * * *'
    # 夕17:00 JST（UTC 8:00）
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 必要なライブラリをインストール
        run: |
          pip install yfinance pandas numpy pytz pandas-datareader==0.10.0
      - name: データ取得・index.html更新
        run: python update.py
      - name: 変更をGitHubにプッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "自動更新: $(date +'%Y-%m-%d %H:%M')"
          git push
